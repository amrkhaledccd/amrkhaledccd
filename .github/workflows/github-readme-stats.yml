name: Generate GitHub Readme Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Generates your main stats card
      - name: Generate Stats Images
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&theme=radical&show_icons=true
          path: profile-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Generates your top languages card
      - name: Generate Top Languages
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&theme=radical&layout=compact
          path: profile-languages.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 3. Saves both files to your repository
      - name: Commit and Push SVGs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"
          git add profile-stats.svg profile-languages.svg
          git commit -m "Update GitHub profile stats and languages" || exit 0
          git push
