name: Generate GitHub Readme Stats

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch:   # Allows manual trigger button

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Give the runner access to your repository files
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Run the actual stats action tool from the correct repo
      - name: Generate Stats Images
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&theme=radical&show_icons=true
          path: profile-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 3: Save the generated image back into your repo files
      - name: Commit and Push SVG
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-stats.svg
          git commit -m "Update GitHub profile stats" || exit 0
          git push
